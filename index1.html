<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox propiedad order</title>
</head>
<body>
     <h1>Flexbox `order` Demo</h1>
    <h2>Orden en el HTML (Visual): 1, 2, 3, 4</h2>
    <h2>Orden Visual Final (CSS `order`): 4, 2, 1, 3</h2>

    <div class="contenedor-flex">
        
        <div class="item-flex item-1">
            <p><strong>ITEM 1</strong> (HTML Order: 1)</p>
            <img src="https://picsum.photos/200/300?random=1" alt="Paisaje 1">
            <p><strong>Aparece en 3er lugar.</strong></p>
        </div>

        <div class="item-flex item-2">
            <p><strong>ITEM 2</strong> (HTML Order: 2)</p>
            <img src="https://picsum.photos/200/300?random=1" alt="Paisaje 2">
            <p><strong>Aparece en 2do lugar.</strong></p>
        </div>

        <div class="item-flex item-3">
            <p><strong>ITEM 3</strong> (HTML Order: 3)</p>
            <img src="https://picsum.photos/200/300?random=2" alt="Paisaje 3">
            <p><strong>Aparece en 4to lugar.</strong></p>
        </div>

        <div class="item-flex item-4">
            <p><strong>ITEM 4</strong> (HTML Order: 4)</p>
            <img src="https://picsum.photos/200/300?random=3" alt="Paisaje 4">
            <p><strong>Aparece en 1er lugar.</strong></p>
        </div>

    </div>

</body>
</html>
